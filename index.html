<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  const cfg = {apiKey:"AIzaSyBcYi3osXuor-LfHp83gcZuUux6RAGoeSM",authDomain:"rescue-training-app.firebaseapp.com",projectId:"rescue-training-app",storageBucket:"rescue-training-app.firebasestorage.app",messagingSenderId:"898474111082",appId:"1:898474111082:web:bfe1efd1f686695ac7da13"};
  const db = getFirestore(initializeApp(cfg));
  window._fbCache = {};
  window._fbListeners = {};
  function watch(key) {
    if (window._fbListeners[key]) return;
    window._fbListeners[key] = onSnapshot(doc(db,"dispatch_settings",key),(snap)=>{
      if(snap.exists()){
        const val=JSON.stringify(snap.data().value);
        window._fbCache[key]=val; localStorage.setItem(key,val);
        window.dispatchEvent(new CustomEvent("fb-sync",{detail:{key,value:val}}));
      }
    });
  }
  watch("duty_overrides"); watch("quals");
  window.storage = {
    async get(k) {
      watch(k);
      if(window._fbCache[k]) return {value:window._fbCache[k]};
      try { const s=await getDoc(doc(db,"dispatch_settings",k)); if(s.exists()){const v=JSON.stringify(s.data().value);window._fbCache[k]=v;return {value:v};} } catch(e){}
      try{const v=localStorage.getItem(k);return v?{value:v}:null;}catch(e){return null;}
    },
    async set(k,v) {
      try{localStorage.setItem(k,v);}catch(e){}
      window._fbCache[k]=v;
      try{await setDoc(doc(db,"dispatch_settings",k),{value:JSON.parse(v),updatedAt:new Date().toISOString()});}catch(e){console.warn("FB set error",e);}
      return {value:v};
    }
  };
  console.log("Firebase initialized: dispatch_settings");
</script>

const canEnter=(m)=>m.rankN>=2&&m.rankN<=4;
const WD=["日","月","火","水","木","金","土"];
function fmtDuty(mo,dStr){const day=parseInt(String(dStr),10);if(!day)return mo+"/"+dStr;const dt=new Date(2026,mo-1,day);return mo+"/"+day+"（"+WD[dt.getDay()]+"）";}
function defaultQuals(){const q={};NAMES.forEach((n)=>{q[n]={kikan:KIKAN_DEFAULT.includes(n),boat:BOAT_DEFAULT.includes(n),license:"中型"};});return q;}
const licenseOK=(lic,need)=>need==="大型"?lic==="大型":(lic==="大型"||lic==="中型");

const SYSTEMS=[
  {id:"entry",name:"屋内進入体系",sub:"火災・建物内進入",color:C.orange,status:"稼働中"},
  {id:"water",name:"水難初動体制",sub:"水難・河川救助",color:C.blue,status:"稼働中"},
  {id:"rope",name:"ロープレスキュー体制",sub:"高所・低所・斜面",color:C.teal,status:"準備中"},
];

function buildPool(units){
  const pool=[];let id=0;
  const add=(name,appa,slot,unit)=>{if(!name)return;pool.push({id:id++,name,appa,slot,unit,leader:slot==="隊長",rank:rankOf(name),rankN:rankPt(name)});};
  for(const appa of ["蓮田1","蓮田2"]){const u=units[appa];if(!u)continue;add(u.c,appa,"隊長","消防隊");(u.m||[]).forEach((n)=>add(n,appa,"隊員","消防隊"));}
  const r=units["救助1"];if(r){add(r.c,"救助1","隊長","救助隊");(r.m||[]).forEach((n)=>add(n,"救助1","隊員","救助隊"));add(r.k,"救助1","機関員","救助隊");}
  return pool;
}

function assignR1(pool){
  const used=new Set();const take=(m)=>{if(m)used.add(m.id);return m;};const free=(a)=>a.filter((m)=>!used.has(m.id));
  const byRank=(a,b)=>b.rankN-a.rankN||APPA_ORDER[a.appa]-APPA_ORDER[b.appa];
  const roles={};const rescueAll=pool.filter((m)=>m.unit==="救助隊");const rc=rescueAll.length;
  const rescueLeader=pool.find((m)=>m.unit==="救助隊"&&m.leader);
  const fireLeaders=pool.filter((m)=>m.unit==="消防隊"&&m.leader).sort(byRank);
  let s,sr,sw;
  if(fireLeaders.length){s=fireLeaders[0];sr="① 消防係の小隊長（"+s.appa+"隊長）";}
  else{const f4=free(pool).filter((m)=>m.unit==="消防隊"&&m.rankN>=4).sort(byRank);
    if(f4.length){s=f4[0];sr="② 消防係 司令補以上";}
    else if(rescueLeader){s=rescueLeader;sr="③ 救助係の小隊長";}
    else{s=free(pool).sort(byRank)[0];sr="該当者なし→代替";sw="指揮者の要件該当者なし";}}
  take(s);roles.shiki={member:s,reason:sr,warn:sw};
  let d,dr,dw;
  if(rc>=3){if(rescueLeader&&!used.has(rescueLeader.id)){d=rescueLeader;dr="① 救助隊3名以上 → 救助小隊長";}
    else{d=free(rescueAll).sort(byRank)[0];dr="救助隊3名以上 → 階級上位の救助隊員";dw="救助小隊長が乗車していません";}}
  else if(rc===2){let c=free(pool).filter((m)=>m.unit==="消防隊"&&m.rankN>=3&&!m.leader).sort(byRank);
    if(c.length){d=c[0];dr="① 救助隊2名 → 消防係（士長以上）";}
    else{c=free(pool).filter((m)=>m.unit==="消防隊"&&m.rankN>=3).sort(byRank);
      if(c.length){d=c[0];dr="消防小隊長が担当（他に士長以上なし）";dw="指揮者と消防小隊長が重複";}
      else{d=free(pool).sort(byRank)[0];dr="該当者なし→代替";dw="ドアコン該当者なし";}}}
  else{d=free(pool).filter((m)=>m.unit==="消防隊"&&m.rankN>=3).sort(byRank)[0]||free(pool).sort(byRank)[0];dr="救助隊2名未満 → 消防係から";dw="救助隊が規定人数（2名）未満";}
  take(d);roles.door={member:d,reason:dr,warn:dw};
  let entry=free(rescueAll).filter((m)=>canEnter(m));let mixed=false;
  if(entry.length<2){mixed=true;entry=entry.concat(free(pool).filter((m)=>m.unit==="消防隊"&&canEnter(m)));}
  entry=entry.sort(byRank).slice(0,2);
  if(entry.length>=2&&!entry.some((m)=>m.rankN>=3)){
    const fs=free(pool).filter((m)=>m.unit==="消防隊"&&m.rankN>=3&&canEnter(m)).sort(byRank);
    if(fs.length){entry=[entry[0],fs[0]].sort(byRank);mixed=true;}
  }
  const r1=entry[0],r2=entry[1];const pairOk=entry.some((m)=>m&&m.rankN>=3);
  take(r1);take(r2);
  roles.r1={member:r1,reason:mixed?"混合編成 → 階級上位":"① 救助隊・階級上位",warn:r1?(pairOk?null:"⚠ ペアに士長以上がいません"):"R1該当者なし"};
  roles.r2={member:r2,reason:mixed?"混合編成 → 士長以上のバディ":"① 救助隊・階級下位",warn:r2?(pairOk?null:"⚠ ペアに士長以上がいません"):"R2該当者なし"};
  const rest=free(pool).sort(byRank);take(rest[0]);
  roles.denrei={member:rest[0],reason:"残員より",warn:rest[0]?null:"伝令該当者なし"};
  return {roles,rc,benched:free(pool)};
}

function assignR2(pool,entryExclude){
  entryExclude=entryExclude||new Set();
  const used=new Set();const take=(m)=>{if(m)used.add(m.id);return m;};const free=(a)=>a.filter((m)=>!used.has(m.id));
  const byRank=(a,b)=>b.rankN-a.rankN||APPA_ORDER[a.appa]-APPA_ORDER[b.appa];
  const roles={};const rescueAll=pool.filter((m)=>m.unit==="救助隊");
  const rescueLeader=pool.find((m)=>m.unit==="救助隊"&&m.leader);
  const fire=pool.filter((m)=>m.unit==="消防隊");const fireEntry=()=>free(fire).filter((m)=>!entryExclude.has(m.id));
  let s,sr,sw;const shorei=free(pool).filter((m)=>m.rankN===5).sort(byRank);
  if(shorei.length){s=shorei[0];sr="① 消防司令";}else if(rescueLeader){s=rescueLeader;sr="② 救助小隊長";}
  else{s=free(pool).sort(byRank)[0];sr="該当者なし→代替";sw="指揮者の要件該当者なし";}
  take(s);roles.shiki={member:s,reason:sr,warn:sw};
  let d,dr,dw;
  if(rescueLeader&&!used.has(rescueLeader.id)){d=rescueLeader;dr="① 救助小隊長";}
  else{const oth=free(rescueAll).sort(byRank);if(oth.length){d=oth[0];dr="② 救助小隊長以外の救助隊";}
    else{d=free(pool).sort(byRank)[0];dr="該当者なし→代替";dw="ドアコン該当者なし（救助隊不足）";}}
  take(d);roles.door={member:d,reason:dr,warn:dw};
  let r1,r1r,r1w;const c=fireEntry().filter((m)=>m.rankN>=3&&m.rankN<=4).sort(byRank);
  if(c.length){r1=c[0];r1r="① 消防士長以上";}else{r1w="R1該当者なし（消防士長〜司令補が不在）";}
  if(r1)take(r1);roles.r1={member:r1,reason:r1r,warn:r1w};
  let r2,r2r,r2w;
  if(r1){const below=fireEntry().filter((m)=>m.rankN>=2&&m.rankN<=r1.rankN).sort(byRank);
    if(below.length){r2=below[0];r2r="① R1と同階級以下";}else{r2w="R2該当者なし";}}
  else{r2w="R1未定のため算出不可";}
  if(r2)take(r2);roles.r2={member:r2,reason:r2r,warn:r2w};
  const rest=free(pool).sort(byRank);take(rest[0]);
  roles.denrei={member:rest[0],reason:"条件なし（残員より）",warn:rest[0]?null:"伝令該当者なし"};
  return {roles,rc:rescueAll.length,benched:free(pool)};
}

const ENTRY_ROLE={shiki:{label:"指揮者",color:C.orange},door:{label:"ドアコン",color:C.amber},r1:{label:"R1",color:C.red},r2:{label:"R2",color:C.blue},denrei:{label:"伝令",color:C.green}};
const ENTRY_ORDER=["shiki","door","r1","r2","denrei"];

function RoleCard({meta,data,prevMember,pool,isEdit,onToggleEdit,onSelect}){
  const m=data.member;const repeat=prevMember&&m&&prevMember.name===m.name;
  const borderColor=data.warn?C.red:(data.manual?C.amber:C.line);
  return (
    <div className="rounded-lg p-3" style={{background:C.panel,border:"1px solid "+borderColor}}>
      <div className="flex items-center justify-between mb-2">
        <span style={{fontFamily:"'Zen Kaku Gothic New',sans-serif",fontWeight:900,fontSize:15,color:meta.color}}>{meta.label}</span>
        <div className="flex gap-1 items-center">
          {data.manual&&<span style={{fontSize:9,color:C.amber}}>手動</span>}
          {repeat&&<span style={{fontSize:9,color:C.dim}}>継続</span>}
          {onToggleEdit&&<button onClick={onToggleEdit}
            style={{fontSize:10,color:C.dim,background:C.panel2,border:"1px solid "+C.line,borderRadius:4,padding:"1px 6px",cursor:"pointer"}}>
            {isEdit?"✕":"変更"}
          </button>}
        </div>
      </div>
      {isEdit&&pool&&(
        <select onChange={(e)=>onSelect(e.target.value||null)} defaultValue=""
          style={{width:"100%",background:C.panel2,border:"1px solid "+C.amber,color:C.text,borderRadius:4,padding:"4px 6px",fontSize:12,marginBottom:8}}>
          <option value="">{"自動（"+(m?m.name:"なし")+"）"}</option>
          {pool.map((p)=><option key={p.id} value={p.name}>{p.name+"（"+p.rank+"・"+p.appa+"）"}</option>)}
        </select>
      )}
      {m?(<>
        <div className="px-2 py-1.5 rounded-sm flex items-center justify-between mb-1.5"
          style={{background:"linear-gradient(180deg,#f2eee4,#ddd6c6)",color:"#1a1d22",borderLeft:"5px solid "+meta.color,fontWeight:800}}>
          <span style={{fontSize:14}}>{m.name}</span><span style={{fontSize:10,color:"#5a5346"}}>{m.rank}</span>
        </div>
        <div style={{fontSize:10,color:C.dim}}>{m.appa+" "+m.slot+(m.leader?"・小隊長":"")}</div>
        <div style={{fontSize:10,color:data.manual?C.amber:meta.color,marginTop:2}}>{"▸ "+(data.manual?"手動指定":data.reason)}</div>
      </>):<div style={{fontSize:12,color:C.red}}>該当者なし</div>}
      {data.warn&&<div style={{fontSize:10,color:C.red,marginTop:4}}>{"✕ "+data.warn}</div>}
    </div>
  );
}

function EntryView({units,dutyKey}){
  const pool=useMemo(()=>buildPool(units),[units]);
  const round1Auto=useMemo(()=>assignR1(pool),[pool]);
  const [overEntry,setOverEntry]=useState({});
  const [editKey,setEditKey]=useState(null);
  useEffect(()=>{setOverEntry({});setEditKey(null);},[dutyKey]);

  function applyOver(roles,prefix){
    const result={};
    ENTRY_ORDER.forEach((rk)=>{
      const ok=prefix+"-"+rk;
      if(overEntry[ok]){
        const found=pool.find((p)=>p.name===overEntry[ok]);
        result[rk]={...roles[rk],member:found||roles[rk].member,manual:true};
      } else { result[rk]={...roles[rk]}; }
    });
    return result;
  }

  const r1roles=useMemo(()=>applyOver(round1Auto.roles,"r1"),[round1Auto,overEntry]);
  const r1id1=r1roles.r1&&r1roles.r1.member?r1roles.r1.member.id:null;
  const r1id2=r1roles.r2&&r1roles.r2.member?r1roles.r2.member.id:null;
  const round2Auto=useMemo(()=>{
    const ex=new Set([r1id1,r1id2].filter((x)=>x!=null));
    return assignR2(pool,ex);
  },[pool,r1id1,r1id2]);
  const r2roles=useMemo(()=>applyOver(round2Auto.roles,"r2"),[round2Auto,overEntry]);

  const handleSelect=(prefix,rk,name)=>{
    setOverEntry((prev)=>{
      const next={...prev};
      if(name){ next[prefix+"-"+rk]=name; } else { delete next[prefix+"-"+rk]; }
      return next;
    });
    setEditKey(null);
  };
  const hasManual=Object.keys(overEntry).length>0;

  return (<>
    <div>
      <div className="flex items-center justify-between mb-2 flex-wrap gap-2">
        <div className="flex items-center gap-2">
          <span style={{fontFamily:"'Zen Kaku Gothic New',sans-serif",fontWeight:900,fontSize:15,color:C.orange}}>1回目進入</span>
          <span style={{fontSize:10,color:C.dim}}>{round1Auto.rc>=3?"救助小隊長がドアコン":round1Auto.rc===2?"消防係がドアコン":"救助隊規定未満"}</span>
        </div>
        {hasManual&&<button onClick={()=>{setOverEntry({});setEditKey(null);}}
          style={{fontSize:11,color:C.dim,background:C.panel2,border:"1px solid "+C.line,borderRadius:6,padding:"3px 8px",cursor:"pointer"}}>手動編集をリセット</button>}
      </div>
      <div className="grid gap-2" style={{gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))"}}>
        {ENTRY_ORDER.map((rk)=>{
          const ek="r1-"+rk;
          return <RoleCard key={rk} meta={ENTRY_ROLE[rk]} data={r1roles[rk]} pool={pool}
            isEdit={editKey===ek} onToggleEdit={()=>setEditKey(editKey===ek?null:ek)}
            onSelect={(name)=>handleSelect("r1",rk,name)} />;
        })}
      </div>
      {round1Auto.benched.length>0&&<div style={{fontSize:11,color:C.dim,marginTop:6}}>{"待機: "+round1Auto.benched.map((m)=>m.name).join("、")}</div>}
    </div>
    <div>
      <div className="flex items-center gap-2 mb-2">
        <span style={{fontFamily:"'Zen Kaku Gothic New',sans-serif",fontWeight:900,fontSize:15,color:C.blue}}>2回目進入（ローテーション）</span>
        <span style={{fontSize:10,color:C.dim}}>救助隊→指揮・ドア／消防隊→R1R2</span>
      </div>
      <div className="grid gap-2" style={{gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))"}}>
        {ENTRY_ORDER.map((rk)=>{
          const ek="r2-"+rk;
          return <RoleCard key={rk} meta={ENTRY_ROLE[rk]} data={r2roles[rk]} prevMember={r1roles[rk].member} pool={pool}
            isEdit={editKey===ek} onToggleEdit={()=>setEditKey(editKey===ek?null:ek)}
            onSelect={(name)=>handleSelect("r2",rk,name)} />;
        })}
      </div>
      {round2Auto.benched.length>0&&<div style={{fontSize:11,color:C.dim,marginTop:6}}>{"待機: "+round2Auto.benched.map((m)=>m.name).join("、")}</div>}
    </div>
    <p style={{fontSize:11,color:C.dim}}>R1・R2は副士長〜司令補で、ペアに士長以上が1人以上必要です。各役の「変更」で手動指定できます（橙枠）。赤枠は要件不足。最終人選は指揮者の判断によります。</p>
  </>);
}

const CAR_LICENSE={"蓮田1":"大型","蓮田2":"中型","救助1":"中型"};
const HOME_PRI={"消防隊":0,"救助隊":1,"救急隊":2,"指令":3};

function assembleWater(units,quals){
  const warnings=[];const cars={};
  ["蓮田1","蓮田2","救助1"].forEach((car)=>{
    const u=units[car]||{};const crew=[];
    if(u.c)crew.push({name:u.c,role:"隊長",car});
    (u.m||[]).forEach((n)=>crew.push({name:n,role:"隊員",car}));
    if(u.k)crew.push({name:u.k,role:"機関員",car});
    cars[car]={crew,origEngineer:u.k||null,count:crew.length,pulled:[]};
  });
  const cand=[];
  ["蓮田1","蓮田2"].forEach((car)=>{cars[car].crew.forEach((p)=>{cand.push({...p,q:quals[p.name]||{},rankN:rankPt(p.name),home:UNIT_HOME[p.name]||"指令"});});});
  let kizai=null;
  const boatCands=cand.filter((p)=>p.q.boat).sort((a,b)=>(HOME_PRI[a.home]-HOME_PRI[b.home])||(b.rankN-a.rankN));
  if(boatCands.length===0){warnings.push("ボート免許保持者が当日いません → 蓮田機材1は組成不可");}
  else{
    const p1=boatCands[0];const remaining=cand.filter((p)=>p.name!==p1.name);
    let p2,driver,driverNote;
    if(p1.q.kikan){p2=remaining.slice().sort((a,b)=>((a.q.kikan?1:0)-(b.q.kikan?1:0))||(a.rankN-b.rankN))[0];driver=p1;driverNote="1人目（ボート）が機関員兼務";}
    else{const certs=remaining.filter((p)=>p.q.kikan).sort((a,b)=>a.rankN-b.rankN);
      if(certs.length){p2=certs[0];driver=p2;driverNote="2人目が機関員（1人目は認定なし）";}
      else{p2=remaining.slice().sort((a,b)=>a.rankN-b.rankN)[0];driver=null;warnings.push("蓮田機材1に機関員（運転者）がいません");}}
    if(!p2)warnings.push("蓮田機材1の2人目を確保できません");
    if(driver&&!licenseOK(driver.q.license,"中型"))warnings.push("蓮田機材1運転者 "+driver.name+"：中型免許なし");
    [p1,p2].filter(Boolean).forEach((p)=>{cars[p.car].pulled.push(p.name);});
    kizai={p1,p2,driver,driverNote};
  }
  ["蓮田1","蓮田2","救助1"].forEach((car)=>{
    const cc=cars[car];cc.remain=cc.crew.filter((p)=>!cc.pulled.includes(p.name));
    const need=CAR_LICENSE[car];let eng=cc.origEngineer;
    if(eng&&cc.pulled.includes(eng)){
      const re=cc.remain.map((p)=>({name:p.name,q:quals[p.name]||{}})).filter((p)=>p.q.kikan)
        .sort((a,b)=>((licenseOK(b.q.license,need)?1:0)-(licenseOK(a.q.license,need)?1:0))||(rankPt(b.name)-rankPt(a.name)));
      eng=re.length?re[0].name:null;cc.reEngineer=!!eng;
    }
    cc.engineer=eng;
    if(cc.remain.length<2)warnings.push(car+"が再編成後 "+cc.remain.length+"名（2名未満）");
    if(!eng){warnings.push(car+"に機関員（認定保持者）がいません");}
    else{const q=quals[eng]||{};if(!q.kikan)warnings.push(car+"機関員 "+eng+"：機関員認定なし");if(!licenseOK(q.license,need))warnings.push(car+"機関員 "+eng+"："+need+"免許なし");}
  });
  return {cars,kizai,warnings};
}

function QualBadge({q}){if(!q)return null;return(<span style={{fontSize:9,color:C.dim}}>{q.kikan?"機":"　"} {q.boat?"舟":"　"} {q.license||"—"}</span>);}

  const res=useMemo(()=>assembleWater(units,quals),[units,quals]);
  return (<>
    <div className="flex items-center justify-between">
      <span style={{fontFamily:"'Zen Kaku Gothic New',sans-serif",fontWeight:900,fontSize:15,color:C.blue}}>水難 車両編成</span>
      <button onClick={openQual} style={{fontSize:11,color:C.dim,background:C.panel2,border:"1px solid "+C.line,borderRadius:6,padding:"4px 10px",cursor:"pointer"}}>資格登録</button>
    </div>
    {res.warnings.length>0&&(
      <div className="rounded-lg p-3" style={{background:"#3a3320",border:"1px solid "+C.amber}}>
        {res.warnings.map((w,i)=><div key={i} style={{fontSize:12,color:C.amber}}>{"⚠ "+w}</div>)}
      </div>
    )}
    <div className="grid gap-2" style={{gridTemplateColumns:"repeat(auto-fit,minmax(230px,1fr))"}}>
      {["蓮田1","蓮田2","救助1"].map((car)=>{
        const cc=res.cars[car];

          <div key={car} className="rounded-lg p-3" style={{background:C.panel,border:"1px solid "+C.line}}>

              <span style={{fontWeight:700,fontSize:13,color:car==="救助1"?C.amber:C.text}}>{car}</span>
              <span style={{fontSize:9,color:C.dim}}>{"運転:"+CAR_LICENSE[car]+"免許"}</span>
            </div>
            {cc.crew.map((p,i)=>{const pulled=cc.pulled.includes(p.name);const q=quals[p.name];const isEng=cc.engineer===p.name;
              return (<div key={i} className="flex items-center justify-between" style={{fontSize:12,padding:"2px 0",opacity:pulled?0.4:1}}>
                <span style={{textDecoration:pulled?"line-through":"none"}}>
                  <span style={{color:C.dim,fontSize:10}}>{p.role==="機関員"?"機":p.role==="隊長"?"長":"員"}{" "}</span>
                  {p.name}{" "}<span style={{color:C.dim,fontSize:9}}>{rankOf(p.name)}</span>

                </span>
                {pulled?<span style={{fontSize:9,color:C.blue}}>→機材1</span>:<QualBadge q={q} />}
              </div>);
            })}

          </div>
        );
      })}
    </div>
    <div className="rounded-lg p-3" style={{background:C.panel,border:"2px solid "+C.blue}}>
      <div style={{fontFamily:"'Zen Kaku Gothic New',sans-serif",fontWeight:900,fontSize:15,color:C.blue,marginBottom:6}}>蓮田機材1（ボート積載車）</div>
      {res.kizai?(
        <div className="grid gap-2" style={{gridTemplateColumns:"1fr 1fr"}}>
          {[["1人目（ボート）",res.kizai.p1],["2人目",res.kizai.p2]].map(([lbl,p],i)=>(
            <div key={i} className="rounded p-2" style={{background:C.panel2,border:"1px solid "+C.line}}>
              <div style={{fontSize:10,color:C.dim}}>{lbl}</div>
              {p?(<><div style={{fontWeight:700,fontSize:14}}>{p.name}{" "}<span style={{fontSize:10,color:C.dim}}>{rankOf(p.name)}</span></div>
                <div style={{fontSize:10,color:C.dim}}>{p.home+"・"+p.car+"より"+(res.kizai.driver&&res.kizai.driver.name===p.name?"・運転":"")}</div></>)
              :<div style={{fontSize:12,color:C.red}}>確保できず</div>}
            </div>
          ))}
          <div style={{gridColumn:"1 / -1",fontSize:11,color:res.kizai.driver?C.dim:C.red,marginTop:2}}>
            {res.kizai.driver?"運転："+res.kizai.driver.name+"（"+res.kizai.driverNote+"）":"運転者なし（機関員不在）"}
          </div>
        </div>
      ):<div style={{fontSize:12,color:C.red}}>組成不可（ボート要員不在）</div>}
    </div>
    <p style={{fontSize:11,color:C.dim}}>機材1は別車両。蓮田1・蓮田2から引き抜き後、元車両を再編成。救助1は引き抜き対象外。水際役割分担は今後追加。</p>
  </>);
}

function Picker({value,onChange}){
  return (<select value={value||""} onChange={(e)=>onChange(e.target.value||null)}
    style={{background:C.panel2,border:"1px solid "+C.line,color:value?C.text:C.dim,borderRadius:4,padding:"2px 4px",fontSize:12,maxWidth:110}}>
    <option value="">—</option>{NAMES.map((n)=><option key={n} value={n}>{n}</option>)}
  </select>);
}

function App(){
  const [view,setView]=useState("home");
  const months=[...new Set(DATA.duties.map((x)=>x.mo))];
  const [mo,setMo]=useState(months[months.length-1]);
  const list=DATA.duties.filter((x)=>x.mo===mo);
  const [idx,setIdx]=useState(0);
  const duty=list[Math.min(idx,list.length-1)];
  const key=duty.mo+"-"+duty.d;
  const [overrides,setOverrides]=useState({});
  const [quals,setQuals]=useState(()=>defaultQuals());
  const [showQual,setShowQual]=useState(false);

  useEffect(()=>{
    (async()=>{
      try{const r=await window.storage.get("duty_overrides");if(r&&r.value)setOverrides(JSON.parse(r.value));}catch(e){}
      try{const q=await window.storage.get("quals");if(q&&q.value){const saved=JSON.parse(q.value);const base=defaultQuals();Object.keys(saved).forEach((n)=>{if(base[n])base[n]={...base[n],...saved[n]};});setQuals(base);}}catch(e){}
    })();
    const handler=(e)=>{
      const {key:k,value:v}=e.detail;
      if(k==="duty_overrides"){try{setOverrides(JSON.parse(v));}catch(err){}}
      if(k==="quals"){try{const saved=JSON.parse(v);const base=defaultQuals();Object.keys(saved).forEach((n)=>{if(base[n])base[n]={...base[n],...saved[n]};});setQuals(base);}catch(err){}}
    };
    window.addEventListener("fb-sync",handler);
    return ()=>window.removeEventListener("fb-sync",handler);
  },[]);

  const persist=async(k,v)=>{try{await window.storage.set(k,JSON.stringify(v));}catch(e){console.error("保存エラー",e);}};
  const edited=!!overrides[key];
  const units=edited?overrides[key]:duty.u;
  const setUnits=(u)=>{const next={...overrides,[key]:u};setOverrides(next);persist("duty_overrides",next);};
  const editField=(appa,field,value,mi)=>{const u=JSON.parse(JSON.stringify(units));if(field==="m"){u[appa].m=u[appa].m||[];u[appa].m[mi]=value;u[appa].m=u[appa].m.filter(Boolean);}else u[appa][field]=value;setUnits(u);};
  const addMember=(appa)=>{const u=JSON.parse(JSON.stringify(units));u[appa].m=[...(u[appa].m||[]),NAMES[0]];setUnits(u);};
  const removeMember=(appa,mi)=>{const u=JSON.parse(JSON.stringify(units));u[appa].m=(u[appa].m||[]).filter((_,i)=>i!==mi);setUnits(u);};
  const resetDay=()=>{const next={...overrides};delete next[key];setOverrides(next);persist("duty_overrides",next);};
  const setQual=(name,field,value)=>{const next={...quals,[name]:{...quals[name],[field]:value}};setQuals(next);persist("quals",next);};

  const inS={background:C.panel2,border:"1px solid "+C.line,color:C.text,borderRadius:6,padding:"6px 10px",fontSize:13};
  const sys=SYSTEMS.find((s)=>s.id===view);

  return (
    <div style={{background:C.ink,minHeight:"100vh",color:C.text,fontFamily:"'BIZ UDGothic','Hiragino Kaku Gothic ProN',sans-serif"}}>
      <style dangerouslySetInnerHTML={{__html:"@import url('https://fonts.googleapis.com/css2?family=BIZ+UDGothic:wght@400;700&family=Zen+Kaku+Gothic+New:wght@500;900&display=swap'); *:focus-visible{outline:2px solid "+C.amber+";outline-offset:2px;}"}} />
      <header className="px-5 pt-5 pb-3" style={{borderBottom:"2px solid "+C.orange}}>
        <button onClick={()=>setView("home")} style={{background:"none",border:"none",cursor:"pointer",textAlign:"left",padding:0}}>
          <div style={{fontSize:11,letterSpacing:"0.3em",color:C.orange,fontWeight:700}}>蓮田市消防本部 第２救助係</div>
          <div style={{fontFamily:"'Zen Kaku Gothic New',sans-serif",fontWeight:900,fontSize:22,color:C.text,marginTop:2}}>出動体制ポータル</div>
        </button>
        {view!=="home"&&(<div className="flex gap-1 mt-3 flex-wrap">
          <button onClick={()=>setView("home")} style={{background:C.panel2,color:C.dim,border:"1px solid "+C.line,borderRadius:6,padding:"5px 12px",fontSize:12,cursor:"pointer"}}>← 一覧</button>
          {SYSTEMS.map((s)=>(<button key={s.id} onClick={()=>setView(s.id)}
            style={{background:view===s.id?s.color:C.panel2,color:view===s.id?"#1a0d05":C.dim,border:"1px solid "+(view===s.id?s.color:C.line),borderRadius:6,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>{s.name}</button>))}
        </div>)}
      </header>
      <main className="p-4 flex flex-col gap-4" style={{maxWidth:1040,margin:"0 auto"}}>
        {view==="home"?(<>
          <p style={{color:C.dim,fontSize:13,marginTop:2}}>当直日を選ぶと、各出動体制の編成を自動で算出します。</p>
          <div className="grid gap-3" style={{gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))"}}>
            {SYSTEMS.map((s)=>(<button key={s.id} onClick={()=>setView(s.id)} className="rounded-xl p-5 text-left"
              style={{background:C.panel,border:"1px solid "+C.line,borderTop:"4px solid "+s.color,cursor:"pointer"}}>
              <div className="flex items-center justify-between">
                <span style={{fontFamily:"'Zen Kaku Gothic New',sans-serif",fontWeight:900,fontSize:18,color:s.color}}>{s.name}</span>
                <span style={{fontSize:10,color:s.status==="稼働中"?C.green:C.dim,border:"1px solid "+(s.status==="稼働中"?C.green:C.line),borderRadius:999,padding:"2px 8px"}}>{s.status}</span>
              </div>
              <div style={{fontSize:12,color:C.dim,marginTop:8}}>{s.sub}</div>
            </button>))}
          </div>
        </>):(<>
          <section className="rounded-lg p-4 flex flex-wrap items-center gap-3" style={{background:C.panel,border:"1px solid "+C.line}}>
            <div className="flex gap-1">
              {months.map((m)=>(<button key={m} onClick={()=>{setMo(m);setIdx(0);}}
                style={{background:mo===m?C.orange:C.panel2,color:mo===m?"#1a0d05":C.dim,border:"1px solid "+(mo===m?C.orange:C.line),borderRadius:6,padding:"6px 14px",fontWeight:700,fontSize:13,cursor:"pointer"}}>{m+"月"}</button>))}
            </div>
            <select value={idx} onChange={(e)=>setIdx(Number(e.target.value))} style={inS}>
              {list.map((x,i)=><option key={i} value={i}>{fmtDuty(x.mo,x.d)+(overrides[x.mo+"-"+x.d]?" ✎":"")}</option>)}
            </select>
            {edited&&<button onClick={resetDay} style={{marginLeft:"auto",fontSize:11,color:C.dim,background:C.panel2,border:"1px solid "+C.line,borderRadius:6,padding:"4px 10px",cursor:"pointer"}}>この日をリセット</button>}
          </section>
          <section className="rounded-lg p-4" style={{background:C.panel2,border:"1px solid "+(edited?C.amber:C.line)}}>
            <h2 style={{fontSize:12,color:C.dim,letterSpacing:"0.08em",marginBottom:8}}>{"当日の災害割（編集可・全体制共通）"+(edited?" ・編集済み":"")}</h2>
            <div className="grid gap-2" style={{gridTemplateColumns:"repeat(auto-fit,minmax(250px,1fr))"}}>
              {["蓮田1","蓮田2","救助1"].map((appa)=>{const u=units[appa]||{c:null,m:[],k:null};const isR=appa==="救助1";
                return (<div key={appa} className="rounded p-2" style={{background:C.panel,border:"1px solid "+C.line}}>
                  <div style={{fontWeight:700,fontSize:13,color:isR?C.amber:C.text,marginBottom:4}}>{appa}</div>
                  <div className="flex items-center gap-2 mb-1" style={{fontSize:11}}><span style={{color:C.dim,width:42}}>隊長</span><Picker value={u.c} onChange={(v)=>editField(appa,"c",v)} /></div>
                  {(u.m||[]).map((nm,mi)=>(<div key={mi} className="flex items-center gap-2 mb-1" style={{fontSize:11}}>
                    <span style={{color:C.dim,width:42}}>隊員</span><Picker value={nm} onChange={(v)=>editField(appa,"m",v,mi)} />
                    <button onClick={()=>removeMember(appa,mi)} style={{color:C.dim,background:"none",border:"none",cursor:"pointer"}}>×</button></div>))}
                  <button onClick={()=>addMember(appa)} style={{fontSize:10,color:C.dim,background:"none",border:"1px dashed "+C.line,borderRadius:4,padding:"1px 6px",cursor:"pointer",marginBottom:4}}>+ 隊員</button>
                  <div className="flex items-center gap-2" style={{fontSize:11,opacity:isR?1:0.55}}><span style={{color:C.dim,width:42}}>機関員</span><Picker value={u.k} onChange={(v)=>editField(appa,"k",v)} /></div>
                </div>);})}
            </div>
          </section>
          {showQual&&(
            <section className="rounded-lg p-4" style={{background:C.panel2,border:"1px solid "+C.line}}>
              <div className="flex items-center justify-between mb-2">
                <h2 style={{fontSize:12,color:C.dim}}>資格登録（機関員認定・ボート免許・免許区分）</h2>
                <button onClick={()=>setShowQual(false)} style={{fontSize:11,color:C.dim,background:"none",border:"none",cursor:"pointer"}}>閉じる ×</button>
              </div>
              <div style={{maxHeight:320,overflowY:"auto"}}>
                {NAMES.map((n)=>{const q=quals[n]||{};return(
                  <div key={n} className="flex items-center gap-3 flex-wrap" style={{fontSize:12,padding:"4px 0",borderTop:"1px solid "+C.line}}>
                    <span style={{width:120}}>{n+" "}<span style={{fontSize:9,color:C.dim}}>{rankOf(n)+"・"+(UNIT_HOME[n]||"")}</span></span>
                    <label className="flex items-center gap-1" style={{cursor:"pointer",color:q.kikan?C.text:C.dim}}><input type="checkbox" checked={!!q.kikan} onChange={(e)=>setQual(n,"kikan",e.target.checked)} />機関員認定</label>
                    <label className="flex items-center gap-1" style={{cursor:"pointer",color:q.boat?C.text:C.dim}}><input type="checkbox" checked={!!q.boat} onChange={(e)=>setQual(n,"boat",e.target.checked)} />ボート</label>
                    <select value={q.license||"中型"} onChange={(e)=>setQual(n,"license",e.target.value)} style={{background:C.panel,border:"1px solid "+C.line,color:C.text,borderRadius:4,padding:"2px 4px",fontSize:11}}><option>大型</option><option>中型</option><option>なし</option></select>
                  </div>);})}
              </div>
            </section>
          )}
          {view==="entry"?<EntryView units={units} dutyKey={key} />
          :view==="water"?<WaterView units={units} quals={quals} openQual={()=>setShowQual(true)} />
          :(<div className="rounded-lg p-5" style={{background:C.panel,border:"1px dashed "+sys.color}}>
              <div style={{fontFamily:"'Zen Kaku Gothic New',sans-serif",fontWeight:900,fontSize:18,color:sys.color}}>{sys.name}</div>
              <p style={{fontSize:13,color:C.dim,marginTop:8,lineHeight:1.7}}>この体制はまだ役割選定ルールが未設定です。役割と選定条件を教えていただければ組み込みます。</p>
            </div>)}
        </>)}
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
